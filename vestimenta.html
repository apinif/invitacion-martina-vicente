<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dress Code: Cóctel Formal - Martina & Vicente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@100;200;300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f7f4f0;
      color: #3a3a3a;
      font-family: 'Outfit', sans-serif;
      font-weight: 100;
      padding: 40px 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 44px;
      font-weight: 400;
      color: #3a3a3a;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .header p {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 200;
      color: #555;
      line-height: 1.8;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: #c9c0b6;
      margin: 32px auto;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 50px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      background-color: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .gallery-item img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
    }

    .back-link {
      text-align: center;
      margin-top: 60px;
    }

    .back-link a {
      display: inline-block;
      font-size: 14px;
      font-weight: 200;
      color: #b36a88;
      text-decoration: none;
      border-bottom: 1px solid #b36a88;
      padding-bottom: 1px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .back-link a:hover {
      color: #fff;
      background-color: #b36a88;
      border-bottom-color: transparent;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 0 16px;
      }

      .header h1 {
        font-size: 32px;
      }

      .header p {
        font-size: 14px;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 12px;
      }

      .gallery-item img {
        height: 200px;
      }
    }

    @media (min-width: 601px) and (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }
    }
  </style>
</head>
